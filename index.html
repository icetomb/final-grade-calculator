<!DOCTYPE html>
<html lang="en">
<head>
  <title>Final Grade Calculator – Find What Score You Need on Your Final Exam</title>
  <meta name="description" content="Free final grade calculator. Enter your current grade and final exam weight to see what score you need to reach your target grade.">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Grade Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Final Grade Calculator</h1>

    <label for="currentGrade">Current Grade (%)</label>
    <input type="number" id="currentGrade" placeholder="e.g. 72" />

    <label for="finalWeight">Final Exam Weight (%)</label>
    <input type="number" id="finalWeight" placeholder="e.g. 40" />

    <label for="targetGrade">Target Course Grade (%)</label>
    <input type="number" id="targetGrade" placeholder="e.g. 80" />

    <button id="calculateBtn">Calculate</button>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
